name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # ========================================
      # 1. 从 GitHub 检出代码（保留完整历史）
      # ========================================
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # ========================================
      # 2. 配置 Git 用户信息
      # ========================================
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.quotepath false
          git config --global i18n.commitencoding utf-8
          git config --global pull.rebase false

      # ========================================
      # 3. 添加 Gitee 远程仓库并拉取最新状态
      # ========================================
      - name: Add Gitee Remote and Fetch
        env:
          GITEE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITEE_USERNAME: gloria-chen
          GITEE_REPO: gloria-chen/repo_test
        run: |
          # 遮蔽 token 显示
          echo "::add-mask::${GITEE_TOKEN}"
          
          echo "🔗 配置 Gitee 远程仓库..."
          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          
          if git remote | grep -q '^gitee$'; then
            git remote set-url gitee "$GITEE_URL"
            echo "  ✅ 更新现有远程仓库"
          else
            git remote add gitee "$GITEE_URL"
            echo "  ✅ 添加新远程仓库"
          fi
          
          echo ""
          echo "📥 拉取 Gitee 远程状态..."
          
          # 尝试 fetch，捕获错误
          if git fetch gitee 2>&1 | tee /tmp/fetch.log; then
            # 检查是否有 main 分支
            if git rev-parse --verify gitee/main >/dev/null 2>&1; then
              echo "  ✅ Gitee 远程仓库已存在，main 分支可用"
              echo "GITEE_EXISTS=true" >> $GITHUB_ENV
              
              # 记录 Gitee HEAD
              GITEE_HEAD=$(git rev-parse gitee/main)
              echo "GITEE_HEAD=${GITEE_HEAD}" >> $GITHUB_ENV
              echo "  📍 Gitee HEAD: ${GITEE_HEAD:0:8}"
            else
              echo "  ⚠️  Gitee 仓库存在但无 main 分支"
              echo "GITEE_EXISTS=false" >> $GITHUB_ENV
            fi
          else
            echo "  ⚠️  Gitee 仓库为空或首次同步"
            echo "GITEE_EXISTS=false" >> $GITHUB_ENV
          fi
      
      # ========================================
      # 4. 应用 Gitee 专用修改（先修改再同步）
      # ========================================
      - name: Apply Gitee Patches
        env:
          CURRENT_COMMIT: ${{ github.sha }}
        run: |
          echo "🔨 应用 Gitee 专用修改"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          START_TIME=$(date +%s)
          
          # 创建临时分支（基于当前提交）
          echo "📝 创建临时分支 temp-sync..."
          git checkout -b temp-sync $CURRENT_COMMIT
          
          # 标记是否有修改
          HAS_PATCH=false
          PATCH_FILES=()
          
          echo ""
          echo "🔧 检查并修改文件..."
          
          # ========================================
          # 修改 .gitmodules
          # ========================================
          if [ -f .gitmodules ]; then
            echo ""
            echo "  📄 处理 .gitmodules..."
            
            # 检查当前文件是否需要修改（检查工作区文件，不是 Gitee 上的）
            if grep -qi "github\.com/Ameba-AIoT" .gitmodules; then
              echo "    🔄 发现 GitHub URL，替换为 Gitee 镜像..."
              
              # 显示修改前的内容
              echo "    修改前:"
              grep -i "github\.com/Ameba-AIoT" .gitmodules | sed 's/^/      /'
              
              # 执行替换
              sed -i.bak 's|github\.com/Ameba-AIoT|gitee.com/ameba-aiot|gi' .gitmodules
              rm -f .gitmodules.bak
              
              # 显示修改后的内容
              echo "    修改后:"
              grep -i "gitee\.com/ameba-aiot" .gitmodules | sed 's/^/      /'
              
              # 验证修改
              if grep -qi "gitee\.com/ameba-aiot" .gitmodules; then
                echo "    ✅ 修改成功"
                HAS_PATCH=true
                PATCH_FILES+=(".gitmodules")
              else
                echo "    ❌ 修改失败"
                exit 1
              fi
            else
              echo "    ✅ 已使用 Gitee 镜像，无需修改"
            fi
          else
            echo ""
            echo "  ⏭️  .gitmodules 不存在，跳过"
          fi
          
          # ========================================
          # 修改 CMake 工具链文件
          # ========================================
          CMAKE_FILES=(
            "ameba-toolchain-asdk-10.3.1.cmake"
            "ameba-toolchain-asdk-12.3.1.cmake"
          )
          
          echo ""
          echo "  📄 处理 CMake 工具链文件..."
          
          for file in "${CMAKE_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo ""
              echo "    🔍 检查 $file..."
              
              # 检查当前文件是否需要修改
              if grep -q 'if(USE_ALIYUN_URL)' "$file"; then
                echo "      🔄 发现条件判断，强制使用阿里云源..."
                
                # 显示修改前的内容
                echo "      修改前:"
                grep -n 'if(USE_ALIYUN_URL)' "$file" | sed 's/^/        /'
                
                # 执行替换
                sed -i.bak 's/if(USE_ALIYUN_URL)/if(1)/g' "$file"
                rm -f "${file}.bak"
                
                # 显示修改后的内容
                echo "      修改后:"
                grep -n 'if(1)' "$file" | sed 's/^/        /'
                
                # 验证修改
                if grep -q 'if(1)' "$file"; then
                  echo "      ✅ 修改成功"
                  HAS_PATCH=true
                  PATCH_FILES+=("$file")
                else
                  echo "      ❌ 修改失败"
                  exit 1
                fi
              else
                echo "      ✅ 已强制使用阿里云源，无需修改"
              fi
            else
              echo ""
              echo "    ⏭️  $file 不存在，跳过"
            fi
          done
          
          # ========================================
          # 提交修改
          # ========================================
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          if [ "$HAS_PATCH" = true ]; then
            echo "✅ 已应用 ${#PATCH_FILES[@]} 个文件的 Gitee 专用修改"
            echo ""
            echo "📝 修改的文件:"
            printf '  - %s\n' "${PATCH_FILES[@]}"
            
            # 提交修改
            git add -A
            git commit -m "chore: apply Gitee-specific patches"
            
            echo ""
            echo "📊 提交详情:"
            git show --stat HEAD | sed 's/^/  /'
            
            echo "HAS_GITEE_PATCH=true" >> $GITHUB_ENV
          else
            echo "✅ 所有文件已适配 Gitee，无需额外修改"
            echo "HAS_GITEE_PATCH=false" >> $GITHUB_ENV
          fi
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          echo ""
          echo "⏱️  修改耗时: ${DURATION}秒"
      
      # ========================================
      # 5. 同步到 Gitee
      # ========================================
      - name: Sync to Gitee
        env:
          CURRENT_COMMIT: ${{ github.sha }}
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "⬆️  同步到 Gitee"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          START_TIME=$(date +%s)
          
          echo ""
          echo "📦 提交信息:"
          echo "  原始提交: ${CURRENT_COMMIT:0:8}"
          echo "  当前分支: temp-sync"
          echo "  是否有补丁: ${{ env.HAS_GITEE_PATCH }}"
          echo ""
          
          # ========================================
          # 场景 1: 首次同步
          # ========================================
          if [ "$GITEE_EXISTS" != "true" ]; then
            echo "🆕 首次同步到 Gitee"
            echo ""
            echo "📤 推送分支..."
            
            if git push gitee temp-sync:main --force 2>&1 | tee /tmp/push.log; then
              echo ""
              echo "✅ 首次同步成功"
              
              END_TIME=$(date +%s)
              DURATION=$((END_TIME - START_TIME))
              echo "⏱️  推送耗时: ${DURATION}秒"
              
              # 清理
              git checkout main 2>/dev/null || true
              git branch -D temp-sync 2>/dev/null || true
              
              exit 0
            else
              echo ""
              echo "❌ 首次同步失败"
              cat /tmp/push.log
              exit 1
            fi
          fi
          
          # ========================================
          # 场景 2: 增量同步 - 比较修改后的文件树
          # ========================================
          echo "🔄 增量同步到 Gitee"
          echo ""
          
          # 获取当前 temp-sync 分支的文件树
          CURRENT_TREE=$(git ls-tree -r HEAD 2>/dev/null | sha256sum | cut -d' ' -f1)
          GITEE_TREE=$(git ls-tree -r gitee/main 2>/dev/null | sha256sum | cut -d' ' -f1)
          
          echo "🔍 比较文件树:"
          echo "  当前分支: ${CURRENT_TREE:0:16}..."
          echo "  Gitee:    ${GITEE_TREE:0:16}..."
          
          if [ "$CURRENT_TREE" = "$GITEE_TREE" ]; then
            echo ""
            echo "✅ 文件内容完全相同，无需推送"
            
            END_TIME=$(date +%s)
            DURATION=$((END_TIME - START_TIME))
            echo "⏱️  检查耗时: ${DURATION}秒"
            
            # 清理
            git checkout main 2>/dev/null || true
            git branch -D temp-sync 2>/dev/null || true
            
            exit 0
          fi
          
          echo ""
          echo "📝 文件内容不同，准备推送..."
          
          # 显示差异
          echo ""
          echo "📊 与 Gitee 的差异:"
          git diff --stat gitee/main HEAD 2>/dev/null | sed 's/^/  /' || echo "  (无法生成差异统计)"
          
          # ========================================
          # 推送到 Gitee
          # ========================================
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📤 推送到 Gitee..."
          echo ""
          
          PUSH_SUCCESS=false
          
          # 优先使用 --force-with-lease
          echo "🔹 尝试使用 --force-with-lease..."
          if git push gitee temp-sync:main --force-with-lease 2>&1 | tee /tmp/push.log; then
            echo "  ✅ 推送成功"
            PUSH_SUCCESS=true
          else
            # 检查是否是 stale info 错误
            if grep -qi "stale\|rejected" /tmp/push.log; then
              echo "  ⚠️  --force-with-lease 被拒绝"
              echo ""
              echo "🔹 使用 --force 重试..."
              
              if git push gitee temp-sync:main --force 2>&1 | tee /tmp/push_force.log; then
                echo "  ✅ 推送成功"
                PUSH_SUCCESS=true
              else
                echo "  ❌ 推送失败"
                cat /tmp/push_force.log
              fi
            else
              echo "  ❌ 推送失败"
              cat /tmp/push.log
            fi
          fi
          
          # ========================================
          # 清理和统计
          # ========================================
          echo ""
          echo "🧹 清理临时分支..."
          git checkout main 2>/dev/null || git checkout -b main $CURRENT_COMMIT
          git branch -D temp-sync 2>/dev/null || true
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          END_TIME=$(date +%s)
          DURATION=$((END_TIME - START_TIME))
          
          if [ "$PUSH_SUCCESS" = true ]; then
            echo "✅ 同步完成"
            echo "⏱️  推送耗时: ${DURATION}秒"
            exit 0
          else
            echo "❌ 同步失败"
            echo "⏱️  总耗时: ${DURATION}秒"
            exit 1
          fi
      
      # ========================================
      # 6. 同步标签
      # ========================================
      - name: Sync Tags to Gitee
        if: success()
        continue-on-error: true
        run: |
          echo ""
          echo "🏷️  同步标签到 Gitee..."
          
          TAG_COUNT=$(git tag | wc -l)
          
          if [ "$TAG_COUNT" -eq 0 ]; then
            echo "  ⏭️  没有标签"
            exit 0
          fi
          
          echo "  📊 标签数: $TAG_COUNT"
          
          if git push gitee --tags --force 2>&1 | tee /tmp/tag_push.log; then
            echo "  ✅ 标签同步成功"
          else
            echo "  ⚠️  标签同步失败（不影响主流程）"
          fi

      # ========================================
      # 7. 清理
      # ========================================
      - name: Cleanup
        if: always()
        run: |
          echo ""
          echo "🧹 清理远程引用..."
          git remote remove gitee 2>/dev/null || true
          echo "✅ 清理完成"

      # ========================================
      # 8. 同步摘要
      # ========================================
      - name: Sync Summary
        if: always()
        run: |
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 同步摘要"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo ""
          echo "📍 GitHub 信息:"
          echo "  仓库: ${{ github.repository }}"
          echo "  分支: ${{ github.ref_name }}"
          echo "  提交: ${{ github.sha }}"
          echo ""
          echo "📍 Gitee 信息:"
          echo "  仓库: gloria-chen/repo_test"
          echo "  状态: ${{ env.GITEE_EXISTS == 'true' && '增量同步' || '首次同步' }}"
          echo "  补丁: ${{ env.HAS_GITEE_PATCH }}"
          echo ""
          echo "✅ 工作流完成"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
