name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Checkout
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: false

      # 2. Configure Git
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.quotepath false
          git config --global i18n.commitencoding utf-8

      # 3. Add Gitee Remote
      - name: Add Gitee Remote and Fetch
        env:
          GITEE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITEE_USERNAME: gloria-chen
          GITEE_REPO: gloria-chen/repo_test
        run: |
          echo "🔗 配置 Gitee 远程仓库..."
          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          
          if git remote | grep -q '^gitee$'; then
            git remote set-url gitee "$GITEE_URL"
          else
            git remote add gitee "$GITEE_URL"
          fi
          
          echo ""
          echo "📥 拉取 Gitee 远程状态..."
          
          if git fetch gitee main 2>/dev/null; then
            echo "✅ Gitee 远程仓库已存在"
            echo "GITEE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "⚠️  Gitee 远程仓库为空或首次同步"
            echo "GITEE_EXISTS=false" >> $GITHUB_ENV
          fi

      # 4. Check if Files Already Patched (NEW!)
      - name: Check if Gitee Files Already Patched
        if: env.GITEE_EXISTS == 'true'
        run: |
          echo "🔍 检查 Gitee 远程文件是否已修改..."
          
          NEED_PATCH=false
          
          # 检查 .gitmodules
          if [ -f .gitmodules ]; then
            echo ""
            echo "📝 检查 .gitmodules..."
            
            if git show gitee/main:.gitmodules 2>/dev/null | grep -q "gitee.com/ameba-aiot"; then
              echo "  ✅ .gitmodules 已使用 Gitee 镜像，跳过修改"
            else
              echo "  ⚠️  .gitmodules 仍使用 GitHub URL，需要修改"
              NEED_PATCH=true
            fi
          fi
          
          # 检查 CMake 文件
          echo ""
          echo "📝 检查 CMake 工具链文件..."
          
          CMAKE_FILES=(
            "ameba-toolchain-asdk-10.3.1.cmake"
            "ameba-toolchain-asdk-12.3.1.cmake"
          )
          
          for file in "${CMAKE_FILES[@]}"; do
            if [ -f "$file" ]; then
              if git show "gitee/main:$file" 2>/dev/null | grep -q "if(1)"; then
                echo "  ✅ $file 已使用阿里云源，跳过修改"
              else
                echo "  ⚠️  $file 仍使用条件判断，需要修改"
                NEED_PATCH=true
              fi
            fi
          done
          
          # 设置环境变量
          echo ""
          if [ "$NEED_PATCH" = true ]; then
            echo "📌 结论: Gitee 文件需要修改"
            echo "GITEE_NEED_PATCH=true" >> $GITHUB_ENV
          else
            echo "✅ 结论: Gitee 文件已是最新，无需修改"
            echo "GITEE_NEED_PATCH=false" >> $GITHUB_ENV
          fi

      # 5. Patch Files (Modified!)
      - name: Patch Files for Gitee
        if: env.GITEE_EXISTS == 'false' || env.GITEE_NEED_PATCH == 'true'
        run: |
          echo "📝 开始修改文件..."
          
          # 修改 .gitmodules
          if [ -f .gitmodules ]; then
            echo ""
            echo "📝 修改 .gitmodules 文件..."
            
            if grep -q "gitee.com/ameba-aiot" .gitmodules; then
              echo "  ⚠️  本地 .gitmodules 已使用 Gitee 镜像，跳过修改"
            else
              sed -i 's|github.com/Ameba-AIoT|gitee.com/ameba-aiot|g' .gitmodules
              echo "  ✅ .gitmodules 已更新"
            fi
          else
            echo "  ⚠️  .gitmodules 不存在"
          fi
          
          # 修改 CMake 文件
          echo ""
          echo "📝 修改 CMake 工具链文件..."
          
          CMAKE_FILES=(
            "ameba-toolchain-asdk-10.3.1.cmake"
            "ameba-toolchain-asdk-12.3.1.cmake"
          )
          
          for file in "${CMAKE_FILES[@]}"; do
            if [ -f "$file" ]; then
              if grep -q 'if(1)' "$file"; then
                echo "  ⚠️  跳过: $file (已修改)"
              else
                echo "  ✅ 修改: $file"
                sed -i 's/if(USE_ALIYUN_URL)/if(1)/g' "$file"
              fi
            else
              echo "  ⚠️  文件不存在: $file"
            fi
          done
          
          # 检查修改结果
          if git diff --quiet; then
            echo ""
            echo "✅ 没有文件需要修改"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            echo ""
            echo "✅ 文件修改完成"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            
            echo ""
            echo "📊 修改的文件列表:"
            git diff --name-only
            
            echo ""
            echo "📄 修改详情:"
            git diff --stat
          fi

      # 6. Commit Changes
      - name: Commit Changes
        if: env.HAS_CHANGES == 'true'
        run: |
          echo "💾 提交修改到本地仓库..."
          git add -A
          
          COMMIT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          cat > commit_message.txt << EOF
          chore: automated sync from GitHub to Gitee

          本次同步修改：
          - 更新 .gitmodules 使用 Gitee 镜像
          - 修改 CMake 工具链配置使用阿里云下载源
          
          Sync Time: ${COMMIT_TIME}
          GitHub SHA: ${{ github.sha }}
          EOF
          
          git commit -F commit_message.txt
          rm commit_message.txt
          
          echo "✅ 提交完成"
          git log -1 --oneline

      # ========================================
      # 7. 同步其他分支和标签（可选）
      # ========================================
      - name: Sync Tags and Other Branches (Optional)
        if: success()
        continue-on-error: true
        run: |
          echo "🏷️  同步标签到 Gitee..."
          git push gitee --tags 2>/dev/null || echo "⚠️  没有新标签或推送失败"
          
          # 如果需要同步其他分支，取消下面注释
          # echo ""
          # echo "🌿 同步其他分支到 Gitee..."
          # for branch in $(git branch -r | grep -v '\->' | grep 'origin/' | sed 's/origin\///'); do
          #   if [ "$branch" != "main" ]; then
          #     echo "  同步分支: $branch"
          #     git checkout $branch
          #     git push gitee $branch 2>/dev/null || echo "  ⚠️  分支 $branch 同步失败"
          #   fi
          # done

      # ========================================
      # 8. 验证同步结果
      # ========================================
      - name: Verify Sync Result
        if: success()
        run: |
          echo "📊 验证同步结果..."
          
          # 获取最新的远程信息
          git fetch gitee main
          
          LOCAL_SHA=$(git rev-parse HEAD)
          REMOTE_SHA=$(git rev-parse gitee/main)
          
          echo ""
          echo "GitHub HEAD: $LOCAL_SHA"
          echo "Gitee HEAD:  $REMOTE_SHA"
          
          if [ "$LOCAL_SHA" = "$REMOTE_SHA" ]; then
            echo ""
            echo "✅ 同步验证成功！HEAD 一致"
          else
            echo ""
            echo "⚠️  HEAD 不一致，但可能是正常情况（如果 Gitee 有独立提交）"
          fi

      # ========================================
      # 9. 清理和摘要
      # ========================================
      - name: Cleanup and Summary
        if: always()
        run: |
          echo "🧹 清理敏感信息..."
          git remote remove gitee 2>/dev/null || true
          
          echo ""
          echo "📊 同步摘要:"
          echo "  GitHub Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Modified Files: ${{ env.HAS_CHANGES }}"
          echo "  Gitee Existed: ${{ env.GITEE_EXISTS }}"
          echo ""
          echo "✅ 同步流程完成"

      # ========================================
      # 10. 可选：定期执行 Gitee GC（仅手动触发）
      # ========================================
      - name: Gitee Repository Maintenance (Optional)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITEE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITEE_USERNAME: gloria-chen
          GITEE_REPO: gloria-chen/repo_test
        run: |
          echo "🧹 执行 Gitee 仓库维护（仅手动触发时）..."
          
          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          
          # 克隆镜像仓库
          git clone --mirror "$GITEE_URL" gitee_mirror
          cd gitee_mirror
          
          echo "📊 维护前大小:"
          du -sh . 2>/dev/null || echo "无法获取大小"
          
          # 清理操作
          git reflog expire --expire=30.days --all
          git gc --prune=now --aggressive
          
          echo ""
          echo "📊 维护后大小:"
          du -sh . 2>/dev/null || echo "无法获取大小"
          
          # 推送清理后的仓库（非强制）
          git push --mirror "$GITEE_URL" || echo "⚠️  推送失败"
          
          cd ..
          rm -rf gitee_mirror
          
          echo "✅ 维护完成"
