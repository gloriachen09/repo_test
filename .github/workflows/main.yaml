name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      # ========================================
      # 1. 从 GitHub 检出代码（保留完整历史）
      # ========================================
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # ========================================
      # 2. 配置 Git 用户信息
      # ========================================
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.quotepath false
          git config --global i18n.commitencoding utf-8
          # 配置 rebase 默认行为
          git config --global pull.rebase false
          git config --global rebase.autoStash true

      # ========================================
      # 3. 添加 Gitee 远程仓库并拉取最新状态
      # ========================================
      - name: Add Gitee Remote and Fetch
        env:
          GITEE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITEE_USERNAME: gloria-chen
          GITEE_REPO: gloria-chen/repo_test
        run: |
          echo "🔗 配置 Gitee 远程仓库..."
          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          
          if git remote | grep -q '^gitee$'; then
            git remote set-url gitee "$GITEE_URL"
          else
            git remote add gitee "$GITEE_URL"
          fi
          
          echo "📥 拉取 Gitee 远程状态..."
          if git fetch gitee 2>/dev/null; then
            if git rev-parse --verify gitee/main >/dev/null 2>&1; then
              echo "✅ Gitee 远程仓库已存在"
              echo "GITEE_EXISTS=true" >> $GITHUB_ENV
              # 记录 Gitee 最新提交
              GITEE_LATEST=$(git rev-parse gitee/main)
              echo "GITEE_LATEST=$GITEE_LATEST" >> $GITHUB_ENV
            else
              echo "⚠️  Gitee 仓库为空或 main 分支不存在"
              echo "GITEE_EXISTS=false" >> $GITHUB_ENV
            fi
          else
            echo "⚠️  Gitee 远程仓库不存在或无法访问"
            echo "GITEE_EXISTS=false" >> $GITHUB_ENV
          fi

      # ========================================
      # 4. 检查是否需要修改文件（仅检查，不立即修改）
      # ========================================
      - name: Check if Files Need Patching
        id: check_patch
        run: |
          NEED_PATCH=false
          
          # 检查 .gitmodules
          if [ -f .gitmodules ]; then
            if grep -q "gitee.com/ameba-aiot" .gitmodules 2>/dev/null; then
              echo "✅ .gitmodules 已配置为 Gitee 镜像"
            else
              echo "⚠️  .gitmodules 需要修改"
              NEED_PATCH=true
            fi
          fi
          
          # 检查 CMake 工具链文件
          CMAKE_FILES=(
            "ameba-toolchain-asdk-10.3.1.cmake"
            "ameba-toolchain-asdk-12.3.1.cmake"
          )
          
          for file in "${CMAKE_FILES[@]}"; do
            if [ -f "$file" ]; then
              if grep -q 'if(1)' "$file" 2>/dev/null; then
                echo "✅ $file 已使用阿里云源"
              else
                echo "⚠️  $file 需要修改"
                NEED_PATCH=true
              fi
            fi
          done
          
          echo "NEED_PATCH=$NEED_PATCH" >> $GITHUB_ENV
          
          if [ "$NEED_PATCH" = "true" ]; then
            echo "📌 结论: 文件需要修改以适配 Gitee"
          else
            echo "✅ 结论: 所有文件已适配 Gitee，无需修改"
          fi

      # ========================================
      # 5. 创建 Gitee 专用分支（仅首次或需要修改时）
      # ========================================
      - name: Create Gitee Patched Branch
        if: env.NEED_PATCH == 'true'
        run: |
          echo "🌿 创建 Gitee 专用分支..."
          
          # 检查是否已有 gitee-patched 分支
          if git ls-remote --heads gitee gitee-patched | grep -q refs; then
            echo "ℹ️  Gitee 上已存在 gitee-patched 分支，拉取..."
            git fetch gitee gitee-patched
            git checkout -b gitee-patched gitee/gitee-patched 2>/dev/null || git checkout -b gitee-patched
          else
            git checkout -b gitee-patched main
          fi
          
          echo "📝 应用 Gitee 专用修改..."
          
          # 修改 .gitmodules
          if [ -f .gitmodules ]; then
            if ! grep -q "gitee.com/ameba-aiot" .gitmodules; then
              echo "  修改 .gitmodules..."
              sed -i 's|github.com/Ameba-AIoT|gitee.com/ameba-aiot|g' .gitmodules
            fi
          fi
          
          # 修改 CMake 工具链文件
          CMAKE_FILES=(
            "ameba-toolchain-asdk-10.3.1.cmake"
            "ameba-toolchain-asdk-12.3.1.cmake"
          )
          
          for file in "${CMAKE_FILES[@]}"; do
            if [ -f "$file" ] && ! grep -q 'if(1)' "$file"; then
              echo "  修改 $file..."
              sed -i 's/if(USE_ALIYUN_URL)/if(1)/g' "$file"
            fi
          done
          
          # 检查是否有实际修改
          if git diff --quiet; then
            echo "⚠️  没有文件需要修改，跳过提交"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            echo "✅ 文件修改完成"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            
            echo "修改的文件:"
            git diff --name-only
            
            git add -A
            git commit -m "chore: apply Gitee-specific patches

              - Update .gitmodules to use Gitee mirror
              - Force CMake toolchain to use Aliyun source
              
              Note: This branch maintains compatibility with Gitee.
              Base: ${{ github.sha }}"
            
            echo "✅ 修改已提交"
          fi

      # ========================================
      # 6. 智能同步到 Gitee（避免重复合并提交）
      # ========================================
      - name: Smart Sync to Gitee
        run: |
          echo "⬆️  开始同步到 Gitee..."
          
          # 确定推送策略
          if [ "$GITEE_EXISTS" != "true" ]; then
            # 首次推送
            echo "📦 首次同步到 Gitee"
            if [ "$NEED_PATCH" = "true" ] && [ "$HAS_CHANGES" = "true" ]; then
              git push gitee gitee-patched:main
            else
              git push gitee main:main
            fi
            echo "✅ 首次同步完成"
            exit 0
          fi
          
          # Gitee 已存在的情况
          echo "📊 检查 Gitee 远程状态..."
          
          # 获取提交关系
          LOCAL_MAIN=$(git rev-parse main)
          GITEE_MAIN=$(git rev-parse gitee/main)
          BASE_COMMIT=$(git merge-base main gitee/main 2>/dev/null || echo "")
          
          echo "  GitHub main:     $LOCAL_MAIN"
          echo "  Gitee main:      $GITEE_MAIN"
          echo "  共同祖先:        $BASE_COMMIT"
          
          # 情况 1: 完全一致，无需同步
          if [ "$LOCAL_MAIN" = "$GITEE_MAIN" ]; then
            echo "✅ Gitee 已是最新，无需同步"
            exit 0
          fi
          
          # 情况 2: Gitee 落后于 GitHub（可以快进）
          if git merge-base --is-ancestor gitee/main main; then
            echo "✅ Gitee 落后于 GitHub，可以快进推送"
            
            if [ "$NEED_PATCH" = "true" ] && [ "$HAS_CHANGES" = "true" ]; then
              # 需要应用修改：更新 gitee-patched 分支
              echo "🔄 更新 gitee-patched 分支..."
              git checkout gitee-patched
              git rebase main
              
              # 检查修改是否已被包含
              if git diff --quiet main..gitee-patched; then
                echo "ℹ️  修改已在 main 分支中，直接推送 main"
                git checkout main
                git push gitee main:main
              else
                echo "📦 推送 gitee-patched 到 Gitee main"
                git push gitee gitee-patched:main
              fi
              git checkout main
            else
              # 无需修改，直接推送
              git push gitee main:main
            fi
            
            echo "✅ 快进推送完成"
            exit 0
          fi
          
          # 情况 3: Gitee 有独立提交（需要处理，但不创建重复合并）
          echo "⚠️  Gitee 有独立提交，需要处理"
          
          # 检查独立提交内容
          echo "📝 Gitee 上的独立提交:"
          git log $BASE_COMMIT..gitee/main --oneline
          
          # 检查这些独立提交是否只是我们之前的修改
          ONLY_PATCH_COMMITS=$(git log $BASE_COMMIT..gitee/main --oneline | grep -c "chore: apply Gitee-specific patches" || echo "0")
          TOTAL_COMMITS=$(git log $BASE_COMMIT..gitee/main --oneline | wc -l)
          
          if [ "$ONLY_PATCH_COMMITS" -eq "$TOTAL_COMMITS" ]; then
            echo "✅ Gitee 的独立提交只是我们之前的修改，可以安全覆盖"
            
            # 重建 gitee-patched 分支
            git checkout -B gitee-patched main
            
            if [ "$NEED_PATCH" = "true" ] && [ "$HAS_CHANGES" = "true" ]; then
              # 重新应用修改
              if [ -f .gitmodules ]; then
                sed -i 's|github.com/Ameba-AIoT|gitee.com/ameba-aiot|g' .gitmodules
              fi
              
              CMAKE_FILES=(
                "ameba-toolchain-asdk-10.3.1.cmake"
                "ameba-toolchain-asdk-12.3.1.cmake"
              )
              
              for file in "${CMAKE_FILES[@]}"; do
                if [ -f "$file" ]; then
                  sed -i 's/if(USE_ALIYUN_URL)/if(1)/g' "$file"
                fi
              done
              
              if ! git diff --quiet; then
                git add -A
                git commit -m "chore: apply Gitee-specific patches

                  - Update .gitmodules to use Gitee mirror
                  - Force CMake toolchain to use Aliyun source
                  
                  Base: $(git rev-parse main)"
              fi
            fi
            
            # 强制推送（使用 --force-with-lease 保证安全）
            echo "📦 强制更新 Gitee main 分支"
            git push gitee gitee-patched:main --force-with-lease
            
          else
            echo "⚠️  Gitee 有其他独立提交，需要手动处理"
            echo "建议: 检查 Gitee 仓库，手动合并或处理冲突"
            exit 1
          fi
          
          git checkout main

      # ========================================
      # 7. 同步标签（可选，不使用 --force）
      # ========================================
      - name: Sync Tags to Gitee
        if: success()
        continue-on-error: true
        run: |
          echo "🏷️  同步标签到 Gitee..."
          git push gitee --tags 2>/dev/null || echo "⚠️  没有新标签"

      # ========================================
      # 8. 清理临时分支和远程引用
      # ========================================
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 清理临时分支..."
          git checkout main
          git branch -D gitee-patched 2>/dev/null || true
          git remote remove gitee 2>/dev/null || true
          echo "✅ 清理完成"

      # ========================================
      # 9. 同步摘要
      # ========================================
      - name: Sync Summary
        if: always()
        run: |
          echo ""
          echo "📊 同步摘要:"
          echo "  GitHub Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Gitee Existed: ${{ env.GITEE_EXISTS }}"
          echo "  Need Patch: ${{ env.NEED_PATCH }}"
          echo "  Has Changes: ${{ env.HAS_CHANGES }}"
          echo ""
          echo "✅ 同步流程完成"
