name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      # ========================================
      # 1. 从 GitHub 检出代码（保留完整历史）
      # ========================================
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # ========================================
      # 2. 配置 Git 用户信息
      # ========================================
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.quotepath false
          git config --global i18n.commitencoding utf-8
          git config --global pull.rebase false

      # ========================================
      # 3. 添加 Gitee 远程仓库并拉取最新状态
      # ========================================
      - name: Add Gitee Remote and Fetch
        env:
          GITEE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITEE_USERNAME: gloria-chen
          GITEE_REPO: gloria-chen/repo_test
        run: |
          echo "🔗 配置 Gitee 远程仓库..."
          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          
          if git remote | grep -q '^gitee$'; then
            git remote set-url gitee "$GITEE_URL"
          else
            git remote add gitee "$GITEE_URL"
          fi
          
          echo "📥 拉取 Gitee 远程状态..."
          if git fetch gitee 2>/dev/null && git rev-parse --verify gitee/main >/dev/null 2>&1; then
            echo "✅ Gitee 远程仓库已存在"
            echo "GITEE_EXISTS=true" >> $GITHUB_ENV
            # 记录 Gitee 最新提交
            GITEE_LATEST=$(git rev-parse gitee/main)
            echo "GITEE_LATEST=$GITEE_LATEST" >> $GITHUB_ENV
          else
            echo "⚠️  Gitee 仓库为空或首次同步"
            echo "GITEE_EXISTS=false" >> $GITHUB_ENV
          fi

      # ========================================
      # 4. 检查是否需要修改文件
      # ========================================
      - name: Check if Files Need Patching
        id: check_patch
        run: |
          NEED_PATCH=false
          
          # 检查 .gitmodules
          if [ -f .gitmodules ]; then
            if grep -q "gitee.com/ameba-aiot" .gitmodules 2>/dev/null; then
              echo "✅ .gitmodules 已配置为 Gitee 镜像"
            else
              echo "⚠️  .gitmodules 需要修改"
              NEED_PATCH=true
            fi
          fi
          
          # 检查 CMake 工具链文件
          CMAKE_FILES=(
            "ameba-toolchain-asdk-10.3.1.cmake"
            "ameba-toolchain-asdk-12.3.1.cmake"
          )
          
          for file in "${CMAKE_FILES[@]}"; do
            if [ -f "$file" ]; then
              if grep -q 'if(1)' "$file" 2>/dev/null; then
                echo "✅ $file 已使用阿里云源"
              else
                echo "⚠️  $file 需要修改"
                NEED_PATCH=true
              fi
            fi
          done
          
          echo "NEED_PATCH=$NEED_PATCH" >> $GITHUB_ENV
          
          if [ "$NEED_PATCH" = "true" ]; then
            echo "📌 结论: 文件需要修改以适配 Gitee"
          else
            echo "✅ 结论: 所有文件已适配 Gitee，无需修改"
          fi

      # ========================================
      # 5. 创建并应用 Gitee 专用修改
      # ========================================
      - name: Apply Gitee Patches
        if: env.NEED_PATCH == 'true'
        run: |
          echo "📝 应用 Gitee 专用修改..."
          
          # 基于当前 main 创建/更新 gitee-patched 分支
          git checkout -B gitee-patched main
          
          # 修改 .gitmodules
          if [ -f .gitmodules ] && ! grep -q "gitee.com/ameba-aiot" .gitmodules; then
            echo "  修改 .gitmodules..."
            sed -i 's|github.com/Ameba-AIoT|gitee.com/ameba-aiot|g' .gitmodules
          fi
          
          # 修改 CMake 工具链文件
          CMAKE_FILES=(
            "ameba-toolchain-asdk-10.3.1.cmake"
            "ameba-toolchain-asdk-12.3.1.cmake"
          )
          
          for file in "${CMAKE_FILES[@]}"; do
            if [ -f "$file" ] && ! grep -q 'if(1)' "$file"; then
              echo "  修改 $file..."
              sed -i 's/if(USE_ALIYUN_URL)/if(1)/g' "$file"
            fi
          done
          
          # 检查是否有实际修改
          if git diff --quiet; then
            echo "⚠️  没有文件需要修改，跳过提交"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
            git checkout main
          else
            echo "✅ 文件修改完成"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            
            echo "修改的文件:"
            git diff --name-only
            
            git add -A
            git commit -m "chore: apply Gitee-specific patches

            - Update .gitmodules to use Gitee mirror
            - Force CMake toolchain to use Aliyun source"
            
            echo "✅ 修改已提交到 gitee-patched 分支"
            git log -1 --oneline
          fi

      # ========================================
      # 6. 智能同步到 Gitee（完全避免重复合并提交）
      # ========================================
      - name: Smart Sync to Gitee
        run: |
          echo "⬆️  开始同步到 Gitee..."
          
          # 首次同步
          if [ "$GITEE_EXISTS" != "true" ]; then
            echo "📦 首次同步到 Gitee"
            if [ "$NEED_PATCH" = "true" ] && [ "$HAS_CHANGES" = "true" ]; then
              git push gitee gitee-patched:main
            else
              git push gitee main:main
            fi
            echo "✅ 首次同步完成"
            exit 0
          fi
          
          # Gitee 已存在，获取提交关系
          LOCAL_SHA=$(git rev-parse main)
          GITEE_SHA=$(git rev-parse gitee/main)
          BASE_COMMIT=$(git merge-base main gitee/main || echo "")
          
          echo "📊 提交对比:"
          echo "  GitHub main:  $LOCAL_SHA"
          echo "  Gitee main:   $GITEE_SHA"
          echo "  共同祖先:     $BASE_COMMIT"
          
          # 情况1: 完全一致
          if [ "$LOCAL_SHA" = "$GITEE_SHA" ]; then
            echo "✅ Gitee 已是最新，无需同步"
            exit 0
          fi
          
          # 情况2: Gitee 可以快进到 GitHub（Gitee 只是落后）
          if git merge-base --is-ancestor gitee/main main; then
            echo "✅ Gitee 落后于 GitHub，可以快进推送"
            
            if [ "$NEED_PATCH" = "true" ] && [ "$HAS_CHANGES" = "true" ]; then
              # 需要应用修改
              echo "🔄 更新 gitee-patched 分支并推送..."
              git checkout gitee-patched
              git rebase main
              git push gitee gitee-patched:main --force-with-lease
              git checkout main
            else
              # 无需修改，直接推送
              git push gitee main:main
            fi
            
            echo "✅ 快进推送完成"
            exit 0
          fi
          
          # 情况3: Gitee 有独立提交（处理但不创建新合并）
          echo "⚠️  Gitee 有独立提交，检查是否只是我们的 patch 提交"
          
          # 获取 Gitee 上的独立提交
          echo ""
          echo "📝 Gitee 上的独立提交:"
          git log --oneline $BASE_COMMIT..gitee/main || echo "  无法获取提交列表"
          
          # 检查独立提交是否都是 "chore: apply Gitee-specific patches"
          # 更精确的判断：检查所有独立提交的提交信息
          PATCH_COUNT=0
          TOTAL_COUNT=0
          
          if [ -n "$BASE_COMMIT" ]; then
            while IFS= read -r commit_msg; do
              TOTAL_COUNT=$((TOTAL_COUNT + 1))
              if echo "$commit_msg" | grep -q "chore: apply Gitee-specific patches"; then
                PATCH_COUNT=$((PATCH_COUNT + 1))
              fi
            done < <(git log --format=%s $BASE_COMMIT..gitee/main 2>/dev/null || echo "")
          fi
          
          echo ""
          echo "  独立提交总数: $TOTAL_COUNT"
          echo "  我们的 patch 提交数: $PATCH_COUNT"
          
          # 如果所有独立提交都是我们的 patch，可以安全覆盖
          if [ "$TOTAL_COUNT" -gt 0 ] && [ "$PATCH_COUNT" -eq "$TOTAL_COUNT" ]; then
            echo "✅ Gitee 的独立提交只是我们之前的修改，可以安全覆盖"
            
            # 重建 gitee-patched 分支
            git checkout -B gitee-patched main
            
            if [ "$NEED_PATCH" = "true" ] && [ "$HAS_CHANGES" = "true" ]; then
              # 重新应用修改
              if [ -f .gitmodules ] && ! grep -q "gitee.com/ameba-aiot" .gitmodules; then
                sed -i 's|github.com/Ameba-AIoT|gitee.com/ameba-aiot|g' .gitmodules
              fi
              
              CMAKE_FILES=(
                "ameba-toolchain-asdk-10.3.1.cmake"
                "ameba-toolchain-asdk-12.3.1.cmake"
              )
              
              for file in "${CMAKE_FILES[@]}"; do
                if [ -f "$file" ] && ! grep -q 'if(1)' "$file"; then
                  sed -i 's/if(USE_ALIYUN_URL)/if(1)/g' "$file"
                fi
              done
              
              if ! git diff --quiet; then
                git add -A
                git commit -m "chore: apply Gitee-specific patches

                    - Update .gitmodules to use Gitee mirror
                    - Force CMake toolchain to use Aliyun source"
              fi
            fi
            
            echo "📦 推送更新到 Gitee main 分支"
            git push gitee gitee-patched:main --force-with-lease
            git checkout main
            
          else
            # Gitee 有其他独立提交（比如手动修改），需要合并
            echo ""
            echo "⚠️  Gitee 有其他独立提交，执行一次性的合并"
            echo "建议后续在 Gitee 上不要直接修改，统一通过 GitHub 同步"
            
            # 创建合并分支
            git checkout -b merge-branch main
            
            # 尝试合并 Gitee 的改动
            if git merge gitee/main --no-edit -m "Merge Gitee changes from main"; then
              echo "✅ 合并成功"
              
              # 如果需要在合并后应用 patch
              if [ "$NEED_PATCH" = "true" ] && [ "$HAS_CHANGES" = "true" ]; then
                echo "🔄 应用 Gitee 专用修改..."
                if [ -f .gitmodules ] && ! grep -q "gitee.com/ameba-aiot" .gitmodules; then
                  sed -i 's|github.com/Ameba-AIoT|gitee.com/ameba-aiot|g' .gitmodules
                fi
                
                for file in "${CMAKE_FILES[@]}"; do
                  if [ -f "$file" ] && ! grep -q 'if(1)' "$file"; then
                    sed -i 's/if(USE_ALIYUN_URL)/if(1)/g' "$file"
                  fi
                done
                
                if ! git diff --quiet; then
                  git add -A
                  git commit -m "chore: apply Gitee-specific patches after merge"
                fi
              fi
              
              # 推送合并结果
              git push gitee merge-branch:main --force-with-lease
              
            else
              echo "❌ 合并冲突，需要手动处理"
              git merge --abort
              exit 1
            fi
            
            git checkout main
            git branch -D merge-branch
          fi

      # ========================================
      # 7. 同步标签
      # ========================================
      - name: Sync Tags to Gitee
        if: success()
        continue-on-error: true
        run: |
          echo "🏷️  同步标签到 Gitee..."
          git push gitee --tags 2>/dev/null || echo "⚠️  没有新标签"

      # ========================================
      # 8. 清理临时分支
      # ========================================
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 清理临时分支..."
          git checkout main 2>/dev/null || true
          git branch -D gitee-patched 2>/dev/null || true
          git branch -D merge-branch 2>/dev/null || true
          git remote remove gitee 2>/dev/null || true
          echo "✅ 清理完成"

      # ========================================
      # 9. 同步摘要
      # ========================================
      - name: Sync Summary
        if: always()
        run: |
          echo ""
          echo "📊 同步摘要:"
          echo "  GitHub Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Gitee Existed: ${{ env.GITEE_EXISTS }}"
          echo "  Need Patch: ${{ env.NEED_PATCH }}"
          echo "  Has Changes: ${{ env.HAS_CHANGES }}"
          echo ""
          echo "✅ 同步流程完成"
