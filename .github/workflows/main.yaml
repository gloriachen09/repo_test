name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      # ========================================
      # 1. 从 GitHub 检出代码（保留完整历史）
      # ========================================
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0  # 获取完整历史
          submodules: false  # 暂不拉取子模块

      # ========================================
      # 2. 配置 Git 用户信息
      # ========================================
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.quotepath false
          git config --global i18n.commitencoding utf-8

      # ========================================
      # 3. 添加 Gitee 远程仓库并拉取最新状态
      # ========================================
      - name: Add Gitee Remote and Fetch
        env:
          GITEE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITEE_USERNAME: gloria-chen
          GITEE_REPO: gloria-chen/repo_test
        run: |
          echo "🔗 配置 Gitee 远程仓库..."
          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          
          # 添加 Gitee 远程仓库
          if git remote | grep -q '^gitee$'; then
            git remote set-url gitee "$GITEE_URL"
          else
            git remote add gitee "$GITEE_URL"
          fi
          
          echo ""
          echo "📥 拉取 Gitee 远程状态..."
          
          # 尝试拉取 Gitee 的 main 分支
          if git fetch gitee main 2>/dev/null; then
            echo "✅ Gitee 远程仓库已存在"
            echo "GITEE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "⚠️  Gitee 远程仓库为空或首次同步"
            echo "GITEE_EXISTS=false" >> $GITHUB_ENV
          fi

      # ========================================
      # 4. 修改文件（在推送前）
      # ========================================
      - name: Patch Files for Gitee
        run: |
          echo "📝 修改 .gitmodules 文件..."
          if [ -f .gitmodules ]; then
            sed -i 's|github.com/Ameba-AIoT|gitee.com/ameba-aiot|g' .gitmodules
            echo "✅ .gitmodules 已更新"
          else
            echo "⚠️  .gitmodules 不存在"
          fi
          
          echo ""
          echo "📝 修改 CMake 工具链文件..."
          
          # 定义要修改的文件列表
          CMAKE_FILES=(
            "ameba-toolchain-asdk-10.3.1.cmake"
            "ameba-toolchain-asdk-12.3.1.cmake"
          )
          
          MODIFIED=0
          
          for file in "${CMAKE_FILES[@]}"; do
            if [ -f "$file" ]; then
              # 检查是否已经修改过
              if ! grep -q 'if(1)' "$file"; then
                echo "  修改: $file"
                sed -i 's/if(USE_ALIYUN_URL)/if(1)/g' "$file"
                MODIFIED=1
              else
                echo "  跳过: $file (已修改)"
              fi
            else
              echo "  ⚠️  文件不存在: $file"
            fi
          done
          
          # 检查是否有文件被修改
          if git diff --quiet; then
            echo ""
            echo "✅ 没有文件需要修改"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
          else
            echo ""
            echo "✅ 文件修改完成"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            
            # 显示修改内容
            echo ""
            echo "📊 修改的文件列表:"
            git diff --name-only
            
            echo ""
            echo "📄 修改详情:"
            git diff --stat
          fi

      # ========================================
      # 5. 提交修改（仅在有变更时）
      # ========================================
      - name: Commit Changes
        if: env.HAS_CHANGES == 'true'
        run: |
          echo "💾 提交修改到本地仓库..."
          git add -A
          
          # 创建详细的提交信息
          COMMIT_TIME=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          cat > commit_message.txt << EOF
          chore: automated sync from GitHub to Gitee

          本次同步修改：
          - 更新 .gitmodules 使用 Gitee 镜像
          - 修改 CMake 工具链配置使用阿里云下载源
          
          Sync Time: ${COMMIT_TIME}
          GitHub SHA: ${{ github.sha }}
          EOF
          
          git commit -F commit_message.txt
          rm commit_message.txt
          
          echo "✅ 提交完成"
          git log -1 --oneline

      # ========================================
      # 6. 智能同步到 Gitee（非强推）
      # ========================================
      - name: Smart Sync to Gitee (Non-Force)
        env:
          GITEE_EXISTS: ${{ env.GITEE_EXISTS }}
          HAS_CHANGES: ${{ env.HAS_CHANGES }}
        run: |
          echo "⬆️  开始同步到 Gitee..."
          
          if [ "$GITEE_EXISTS" = "true" ]; then
            echo ""
            echo "📊 检查 Gitee 远程状态..."
            
            # 获取本地和远程的 SHA
            LOCAL_SHA=$(git rev-parse HEAD)
            REMOTE_SHA=$(git rev-parse gitee/main 2>/dev/null || echo "")
            
            echo "  本地 HEAD: $LOCAL_SHA"
            echo "  远程 HEAD: $REMOTE_SHA"
            
            if [ "$LOCAL_SHA" = "$REMOTE_SHA" ] && [ "$HAS_CHANGES" != "true" ]; then
              echo ""
              echo "✅ Gitee 已是最新，跳过推送"
              exit 0
            fi
            
            # 检查是否可以快进合并
            if git merge-base --is-ancestor gitee/main HEAD; then
              echo ""
              echo "✅ 可以快进合并，直接推送"
              git push gitee main
            else
              echo ""
              echo "⚠️  无法快进合并，Gitee 可能有独立提交"
              echo "🔄 尝试合并 Gitee 的更改..."
              
              # 尝试合并 Gitee 的改动
              if git merge gitee/main --no-edit -m "Merge Gitee changes before sync"; then
                echo "✅ 合并成功，推送合并后的结果"
                git push gitee main
              else
                echo ""
                echo "❌ 自动合并失败，存在冲突"
                echo "🔧 使用策略：优先使用 GitHub 版本"
                
                # 取消合并
                git merge --abort
                
                # 使用 --force-with-lease（更安全的强推）
                echo "⚠️  使用 --force-with-lease 推送（仅在远程未变更时生效）"
                if git push gitee main --force-with-lease; then
                  echo "✅ 推送成功"
                else
                  echo "❌ 推送失败，Gitee 可能有其他人推送的新提交"
                  echo "💡 建议手动检查并解决冲突"
                  exit 1
                fi
              fi
            fi
          else
            echo ""
            echo "⚠️  Gitee 仓库为空，首次推送"
            git push gitee main
          fi
          
          echo ""
          echo "✅ 同步完成"

      # ========================================
      # 7. 同步其他分支和标签（可选）
      # ========================================
      - name: Sync Tags and Other Branches (Optional)
        if: success()
        continue-on-error: true
        run: |
          echo "🏷️  同步标签到 Gitee..."
          git push gitee --tags 2>/dev/null || echo "⚠️  没有新标签或推送失败"
          
          # 如果需要同步其他分支，取消下面注释
          # echo ""
          # echo "🌿 同步其他分支到 Gitee..."
          # for branch in $(git branch -r | grep -v '\->' | grep 'origin/' | sed 's/origin\///'); do
          #   if [ "$branch" != "main" ]; then
          #     echo "  同步分支: $branch"
          #     git checkout $branch
          #     git push gitee $branch 2>/dev/null || echo "  ⚠️  分支 $branch 同步失败"
          #   fi
          # done

      # ========================================
      # 8. 验证同步结果
      # ========================================
      - name: Verify Sync Result
        if: success()
        run: |
          echo "📊 验证同步结果..."
          
          # 获取最新的远程信息
          git fetch gitee main
          
          LOCAL_SHA=$(git rev-parse HEAD)
          REMOTE_SHA=$(git rev-parse gitee/main)
          
          echo ""
          echo "GitHub HEAD: $LOCAL_SHA"
          echo "Gitee HEAD:  $REMOTE_SHA"
          
          if [ "$LOCAL_SHA" = "$REMOTE_SHA" ]; then
            echo ""
            echo "✅ 同步验证成功！HEAD 一致"
          else
            echo ""
            echo "⚠️  HEAD 不一致，但可能是正常情况（如果 Gitee 有独立提交）"
          fi

      # ========================================
      # 9. 清理和摘要
      # ========================================
      - name: Cleanup and Summary
        if: always()
        run: |
          echo "🧹 清理敏感信息..."
          git remote remove gitee 2>/dev/null || true
          
          echo ""
          echo "📊 同步摘要:"
          echo "  GitHub Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Modified Files: ${{ env.HAS_CHANGES }}"
          echo "  Gitee Existed: ${{ env.GITEE_EXISTS }}"
          echo ""
          echo "✅ 同步流程完成"

      # ========================================
      # 10. 可选：定期执行 Gitee GC（仅手动触发）
      # ========================================
      - name: Gitee Repository Maintenance (Optional)
        if: github.event_name == 'workflow_dispatch'
        env:
          GITEE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITEE_USERNAME: gloria-chen
          GITEE_REPO: gloria-chen/repo_test
        run: |
          echo "🧹 执行 Gitee 仓库维护（仅手动触发时）..."
          
          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          
          # 克隆镜像仓库
          git clone --mirror "$GITEE_URL" gitee_mirror
          cd gitee_mirror
          
          echo "📊 维护前大小:"
          du -sh . 2>/dev/null || echo "无法获取大小"
          
          # 清理操作
          git reflog expire --expire=30.days --all
          git gc --prune=now --aggressive
          
          echo ""
          echo "📊 维护后大小:"
          du -sh . 2>/dev/null || echo "无法获取大小"
          
          # 推送清理后的仓库（非强制）
          git push --mirror "$GITEE_URL" || echo "⚠️  推送失败"
          
          cd ..
          rm -rf gitee_mirror
          
          echo "✅ 维护完成"
