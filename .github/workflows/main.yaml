name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      # ========================================
      # 1. 从 GitHub 检出代码（保留完整历史）
      # ========================================
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # ========================================
      # 2. 配置 Git 用户信息
      # ========================================
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.quotepath false
          git config --global i18n.commitencoding utf-8
          git config --global pull.rebase false

      # ========================================
      # 3. 添加 Gitee 远程仓库并拉取最新状态
      # ========================================
      - name: Add Gitee Remote and Fetch
        env:
          GITEE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITEE_USERNAME: gloria-chen
          GITEE_REPO: gloria-chen/repo_test
        run: |
          echo "🔗 配置 Gitee 远程仓库..."
          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          
          if git remote | grep -q '^gitee$'; then
            git remote set-url gitee "$GITEE_URL"
          else
            git remote add gitee "$GITEE_URL"
          fi
          
          echo "📥 拉取 Gitee 远程状态..."
          if git fetch gitee 2>/dev/null && git rev-parse --verify gitee/main >/dev/null 2>&1; then
            echo "✅ Gitee 远程仓库已存在"
            echo "GITEE_EXISTS=true" >> $GITHUB_ENV
            GITEE_LATEST=$(git rev-parse gitee/main)
            echo "GITEE_LATEST=$GITEE_LATEST" >> $GITHUB_ENV
          else
            echo "⚠️  Gitee 仓库为空或首次同步"
            echo "GITEE_EXISTS=false" >> $GITHUB_ENV
          fi
      
      # ========================================
      # 4. 检查是否需要修改文件（对比 Gitee 远程）
      # ========================================
      - name: Check if Files Need Patching
        id: check_patch
        run: |
          # 如果 Gitee 不存在，需要 patch
          if [ "$GITEE_EXISTS" != "true" ]; then
            echo "NEED_PATCH=true" >> $GITHUB_ENV
            echo "Gitee 不存在，需要创建"
            exit 0
          fi
          
          echo "🔍 对比 Gitee 远程分支的文件状态..."
          NEED_PATCH=false
          
          # 检查 .gitmodules
          if [ -f .gitmodules ]; then
            if git show gitee/main:.gitmodules 2>/dev/null | grep -q "gitee.com/ameba-aiot"; then
              echo "  ✅ .gitmodules 已适配 Gitee"
            else
              echo "  ⚠️  .gitmodules 需要修改"
              NEED_PATCH=true
            fi
          fi
          
          # 检查 CMake 工具链文件
          CMAKE_FILES=(
            "ameba-toolchain-asdk-10.3.1.cmake"
            "ameba-toolchain-asdk-12.3.1.cmake"
          )
          
          for file in "${CMAKE_FILES[@]}"; do
            if [ -f "$file" ]; then
              if git show "gitee/main:$file" 2>/dev/null | grep -q 'if(1)'; then
                echo "  ✅ $file 已适配 Gitee"
              else
                echo "  ⚠️  $file 需要修改"
                NEED_PATCH=true
              fi
            fi
          done
          
          echo "NEED_PATCH=$NEED_PATCH" >> $GITHUB_ENV
          
          if [ "$NEED_PATCH" = "true" ]; then
            echo "📌 需要应用 patch"
          else
            echo "✅ 无需修改"
          fi
      
      # ========================================
      # 5. 应用 Gitee 专用修改（仅在需要时）
      # ========================================
      - name: Apply Gitee Patches
        if: env.NEED_PATCH == 'true'
        run: |
          echo "📝 应用 Gitee 专用修改..."
          
          # 基于当前 main 创建/更新 gitee-patched 分支
          git checkout -B gitee-patched main
          
          # 检查是否需要修改 .gitmodules
          if [ -f .gitmodules ]; then
            # 对比 Gitee 上的版本，如果已经修改过就跳过
            CURRENT_CONTENT=$(cat .gitmodules)
            GITEE_CONTENT=$(git show gitee/main:.gitmodules 2>/dev/null || echo "")
            
            if echo "$CURRENT_CONTENT" | grep -q "github.com/Ameba-AIoT" && \
               ! echo "$GITEE_CONTENT" | grep -q "gitee.com/ameba-aiot"; then
              echo "  修改 .gitmodules..."
              sed -i 's|github.com/Ameba-AIoT|gitee.com/ameba-aiot|g' .gitmodules
            else
              echo "  .gitmodules 无需修改"
            fi
          fi
          
          # 检查 CMake 工具链文件
          CMAKE_FILES=(
            "ameba-toolchain-asdk-10.3.1.cmake"
            "ameba-toolchain-asdk-12.3.1.cmake"
          )
          
          for file in "${CMAKE_FILES[@]}"; do
            if [ -f "$file" ]; then
              CURRENT_CONTENT=$(cat "$file")
              GITEE_CONTENT=$(git show "gitee/main:$file" 2>/dev/null || echo "")
              
              if echo "$CURRENT_CONTENT" | grep -q "if(USE_ALIYUN_URL)" && \
                 ! echo "$GITEE_CONTENT" | grep -q 'if(1)'; then
                echo "  修改 $file..."
                sed -i 's/if(USE_ALIYUN_URL)/if(1)/g' "$file"
              else
                echo "  $file 无需修改"
              fi
            fi
          done
          
          # 检查是否有实际修改
          if git diff --quiet; then
            echo "⚠️  没有文件需要修改，跳过提交"
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
            git checkout main
          else
            echo "✅ 文件修改完成"
            echo "HAS_CHANGES=true" >> $GITHUB_ENV
            
            echo "修改的文件:"
            git diff --name-only
            
            git add -A
            git commit -m "chore: apply Gitee-specific patches
            
            - Update .gitmodules to use Gitee mirror
            - Force CMake toolchain to use Aliyun source"
            
            echo "✅ 修改已提交"
          fi
      
      # ========================================
      # 6. 简化版：只确保文件内容同步
      # ========================================
      - name: Sync to Gitee (Content-based)
        run: |
          echo "⬆️  同步文件内容到 Gitee..."
          
          CURRENT_COMMIT=${{ github.sha }}
          
          # 首次同步
          if [ "$GITEE_EXISTS" != "true" ]; then
            echo "📦 首次同步"
            if [ "$NEED_PATCH" = "true" ] && [ "$HAS_CHANGES" = "true" ]; then
              git push gitee gitee-patched:main
            else
              git push gitee main:main
            fi
            exit 0
          fi
          
          GITEE_HEAD=$(git rev-parse gitee/main)
          
          # 比较文件树是否相同
          GITHUB_TREE=$(git ls-tree -r $CURRENT_COMMIT 2>/dev/null | sha256sum | cut -d' ' -f1)
          GITEE_TREE=$(git ls-tree -r $GITEE_HEAD 2>/dev/null | sha256sum | cut -d' ' -f1)
          
          if [ "$GITHUB_TREE" = "$GITEE_TREE" ]; then
            echo "✅ 文件内容相同，无需同步"
            exit 0
          fi
          
          # 文件内容不同，需要同步
          echo "🔄 文件内容不同，正在同步..."
          
          # 创建临时分支
          git checkout -b temp-sync $CURRENT_COMMIT
          
          # 应用 patch（如果需要）
          if [ "$NEED_PATCH" = "true" ] && [ "$HAS_CHANGES" = "true" ]; then
            if [ -f .gitmodules ] && ! grep -q "gitee.com/ameba-aiot" .gitmodules; then
              sed -i 's|github.com/Ameba-AIoT|gitee.com/ameba-aiot|g' .gitmodules
            fi
            
            for file in ameba-toolchain-asdk-10.3.1.cmake ameba-toolchain-asdk-12.3.1.cmake; do
              if [ -f "$file" ] && ! grep -q 'if(1)' "$file"; then
                sed -i 's/if(USE_ALIYUN_URL)/if(1)/g' "$file"
              fi
            done
            
            if ! git diff --quiet; then
              git add -A
              git commit -m "chore: apply Gitee-specific patches"
            fi
          fi
          
          # 强制推送（确保内容一致）
          echo "📦 推送文件内容到 Gitee..."
          git push gitee temp-sync:main --force-with-lease
          
          # 清理
          git checkout main
          git branch -D temp-sync
          
          echo "✅ 同步完成"
      # ========================================
      # 7. 同步标签
      # ========================================
      - name: Sync Tags to Gitee
        if: success()
        continue-on-error: true
        run: |
          echo "🏷️  同步标签到 Gitee..."
          git push gitee --tags 2>/dev/null || echo "⚠️  没有新标签"

      # ========================================
      # 8. 清理临时分支
      # ========================================
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 清理临时分支..."
          git checkout main 2>/dev/null || true
          git branch -D gitee-patched 2>/dev/null || true
          git branch -D merge-branch 2>/dev/null || true
          git remote remove gitee 2>/dev/null || true
          echo "✅ 清理完成"

      # ========================================
      # 9. 同步摘要
      # ========================================
      - name: Sync Summary
        if: always()
        run: |
          echo ""
          echo "📊 同步摘要:"
          echo "  GitHub Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Gitee Existed: ${{ env.GITEE_EXISTS }}"
          echo "  Need Patch: ${{ env.NEED_PATCH }}"
          echo "  Has Changes: ${{ env.HAS_CHANGES }}"
          echo ""
          echo "✅ 同步流程完成"
