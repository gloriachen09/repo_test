name: Sync to Gitee

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    
    steps:
      # ========================================
      # 1. 从 GitHub 检出代码（保留完整历史）
      # ========================================
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      # ========================================
      # 2. 配置 Git 用户信息
      # ========================================
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global core.quotepath false
          git config --global i18n.commitencoding utf-8
          git config --global pull.rebase false

      # ========================================
      # 3. 添加 Gitee 远程仓库并拉取最新状态
      # ========================================
      - name: Add Gitee Remote and Fetch
        env:
          GITEE_TOKEN: ${{ secrets.GITCODE_TOKEN }}
          GITEE_USERNAME: gloria-chen
          GITEE_REPO: gloria-chen/repo_test
        run: |
          echo "🔗 配置 Gitee 远程仓库..."
          GITEE_URL="https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/${GITEE_REPO}.git"
          
          if git remote | grep -q '^gitee$'; then
            git remote set-url gitee "$GITEE_URL"
          else
            git remote add gitee "$GITEE_URL"
          fi
          
          echo "📥 拉取 Gitee 远程状态..."
          if git fetch gitee 2>/dev/null && git rev-parse --verify gitee/main >/dev/null 2>&1; then
            echo "✅ Gitee 远程仓库已存在"
            echo "GITEE_EXISTS=true" >> $GITHUB_ENV
          else
            echo "⚠️  Gitee 仓库为空或首次同步"
            echo "GITEE_EXISTS=false" >> $GITHUB_ENV
          fi
      
      # ========================================
      # 4. 同步到 Gitee（直接处理 patch）
      # ========================================
      - name: Sync to Gitee
        run: |
          echo "⬆️  同步到 Gitee..."
          
          CURRENT_COMMIT=${{ github.sha }}
          echo "当前提交: $CURRENT_COMMIT"
          echo "提交信息: $(git log -1 --format=%s $CURRENT_COMMIT)"
          
          # ========================================
          # 首次同步：直接推送
          # ========================================
          if [ "$GITEE_EXISTS" != "true" ]; then
            echo "📦 首次同步"
            git push gitee main:main
            echo "✅ 首次同步完成"
            exit 0
          fi
          
          # ========================================
          # 非首次同步：检查是否需要更新
          # ========================================
          GITEE_HEAD=$(git rev-parse gitee/main)
          echo "Gitee HEAD: $GITEE_HEAD"
          
          # 比较文件树是否相同
          GITHUB_TREE=$(git ls-tree -r $CURRENT_COMMIT 2>/dev/null | sha256sum | cut -d' ' -f1)
          GITEE_TREE=$(git ls-tree -r $GITEE_HEAD 2>/dev/null | sha256sum | cut -d' ' -f1)
          
          if [ "$GITHUB_TREE" = "$GITEE_TREE" ]; then
            echo "✅ 文件内容相同，无需同步"
            exit 0
          fi
          
          echo "🔄 文件内容不同，开始同步..."
          
          # ========================================
          # 创建临时分支并应用 Gitee 专用修改
          # ========================================
          echo ""
          echo "📝 创建临时分支并检查是否需要 Gitee 专用修改..."
          
          # 基于当前提交创建临时分支
          git checkout -b temp-sync $CURRENT_COMMIT
          
          # 标记是否有修改
          HAS_PATCH=false
          
          # 检查并修改 .gitmodules
          if [ -f .gitmodules ]; then
            if grep -q "github.com/Ameba-AIoT" .gitmodules; then
              echo "  修改 .gitmodules 使用 Gitee 镜像..."
              sed -i 's|github.com/Ameba-AIoT|gitee.com/ameba-aiot|g' .gitmodules
              HAS_PATCH=true
            else
              echo "  .gitmodules 已适配，无需修改"
            fi
          fi
          
          # 检查并修改 CMake 工具链文件
          CMAKE_FILES=(
            "ameba-toolchain-asdk-10.3.1.cmake"
            "ameba-toolchain-asdk-12.3.1.cmake"
          )
          
          for file in "${CMAKE_FILES[@]}"; do
            if [ -f "$file" ]; then
              if grep -q "if(USE_ALIYUN_URL)" "$file"; then
                echo "  修改 $file 使用阿里云源..."
                sed -i 's/if(USE_ALIYUN_URL)/if(1)/g' "$file"
                HAS_PATCH=true
              else
                echo "  $file 已适配，无需修改"
              fi
            fi
          done
          
          # 如果有修改，提交更改
          if [ "$HAS_PATCH" = true ]; then
            echo ""
            echo "✅ 应用 Gitee 专用修改"
            git add -A
            git commit -m "chore: apply Gitee-specific patches
            
            - Update .gitmodules to use Gitee mirror
            - Force CMake toolchain to use Aliyun source"
            
            echo "修改的文件:"
            git diff HEAD~1 --name-only
          else
            echo ""
            echo "✅ 无需修改，直接同步原始内容"
          fi
          
          # ========================================
          # 推送到 Gitee
          # ========================================
          echo ""
          echo "📦 推送到 Gitee..."
          
          if git push gitee temp-sync:main --force-with-lease; then
            echo "✅ 推送成功"
          else
            echo "❌ 推送失败"
            exit 1
          fi
          
          # ========================================
          # 清理
          # ========================================
          git checkout main
          git branch -D temp-sync
          
          echo ""
          echo "✅ 同步完成"
      
      # ========================================
      # 5. 同步标签
      # ========================================
      - name: Sync Tags to Gitee
        if: success()
        continue-on-error: true
        run: |
          echo "🏷️  同步标签到 Gitee..."
          git push gitee --tags 2>/dev/null || echo "⚠️  没有新标签"

      # ========================================
      # 6. 清理远程引用
      # ========================================
      - name: Cleanup
        if: always()
        run: |
          echo "🧹 清理远程引用..."
          git remote remove gitee 2>/dev/null || true
          echo "✅ 清理完成"

      # ========================================
      # 7. 同步摘要
      # ========================================
      - name: Sync Summary
        if: always()
        run: |
          echo ""
          echo "📊 同步摘要:"
          echo "  GitHub Commit: ${{ github.sha }}"
          echo "  Branch: ${{ github.ref_name }}"
          echo "  Gitee Existed: ${{ env.GITEE_EXISTS }}"
          echo ""
          echo "✅ 同步流程完成"
